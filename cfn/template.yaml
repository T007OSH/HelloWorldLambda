AWSTemplateFormatVersion: "2010-09-09"
Description: DevOps Lambda Functions

Parameters:
  S3Bucket:
    Type: String
    Description: S3 bucket containing the Lambda deployment packages
  HelloWorldS3Key:
    Type: String
    Description: S3 key for the HelloWorld Lambda deployment package
    Default: hello_world.zip
  MarginCallCheckerS3Key:
    Type: String
    Description: S3 key for the MarginCallChecker Lambda deployment package
    Default: margin_call_checker.zip
  AgenticLayerS3Key:
    Type: String
    Description: S3 key for the agentic layer zip
    Default: agentic-layer.zip

Resources:
  # ---------- HelloWorld Lambda ----------
  HelloWorldLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  HelloWorldFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: HelloWorldFunction
      Runtime: python3.13
      Handler: lambda_function.lambda_handler
      Role: !GetAtt HelloWorldLambdaRole.Arn
      Code:
        S3Bucket: !Ref S3Bucket
        S3Key: !Ref HelloWorldS3Key

  # ---------- MarginCallChecker Lambda ----------
  MarginCallCheckerRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: S3ReadAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                Resource: !Sub "arn:aws:s3:::bkt-doc-src-margin-call/*"
        - PolicyName: BedrockInvokeAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                  - bedrock:InvokeModelWithResponseStream
                Resource: "*"

  AgenticLayer:
    Type: AWS::Lambda::LayerVersion
    Properties:
      LayerName: agentic-layer
      Description: Additional dependencies for agentic Lambda functions
      Content:
        S3Bucket: !Ref S3Bucket
        S3Key: !Ref AgenticLayerS3Key
      CompatibleRuntimes:
        - python3.13

  MarginCallCheckerFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: MarginCallCheckerFunction
      Runtime: python3.13
      Handler: margin_call_checker.lambda_handler
      Role: !GetAtt MarginCallCheckerRole.Arn
      Timeout: 120
      MemorySize: 512
      Environment:
        Variables:
          OTEL_PYTHON_CONTEXT: contextvars_context
      Code:
        S3Bucket: !Ref S3Bucket
        S3Key: !Ref MarginCallCheckerS3Key
      Layers:
        - !Ref AgenticLayer

  S3InvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref MarginCallCheckerFunction
      Action: lambda:InvokeFunction
      Principal: s3.amazonaws.com
      SourceArn: !Sub "arn:aws:s3:::bkt-doc-src-margin-call"

  MarginCallSourceBucket:
    Type: AWS::S3::Bucket
    DependsOn: S3InvokePermission
    Properties:
      BucketName: bkt-doc-src-margin-call
      NotificationConfiguration:
        LambdaConfigurations:
          - Event: s3:ObjectCreated:*
            Function: !GetAtt MarginCallCheckerFunction.Arn

Outputs:
  HelloWorldFunctionArn:
    Description: HelloWorld Lambda Function ARN
    Value: !GetAtt HelloWorldFunction.Arn
  HelloWorldFunctionName:
    Description: HelloWorld Lambda Function Name
    Value: !Ref HelloWorldFunction
  MarginCallCheckerFunctionArn:
    Description: MarginCallChecker Lambda Function ARN
    Value: !GetAtt MarginCallCheckerFunction.Arn
  MarginCallCheckerFunctionName:
    Description: MarginCallChecker Lambda Function Name
    Value: !Ref MarginCallCheckerFunction
  MarginCallSourceBucketArn:
    Description: Margin Call Source S3 Bucket ARN
    Value: !GetAtt MarginCallSourceBucket.Arn
