version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.12
    commands:
      - pip install pytest

  pre_build:
    commands:
      - echo "Running unit tests..."
      - pytest tests/ -v

  build:
    commands:
      - echo "Packaging HelloWorld Lambda..."
      - cd src && zip ../hello_world.zip lambda_function.py && cd ..
      - echo "Packaging MarginCallChecker Lambda..."
      - cd src && zip ../margin_call_checker.zip margin_call_checker.py && cd ..
      - echo "Packaging agentic layer..."
      - mkdir -p layer_build/python
      - pip install -r layers/agentic-layer/requirements.txt -t layer_build/python --platform manylinux2014_x86_64 --only-binary=:all:
      - find layer_build -type d -name "__pycache__" -exec rm -rf {} + 2>/dev/null || true
      - find layer_build -type d -name "*.dist-info" -exec rm -rf {} + 2>/dev/null || true
      - cd layer_build && zip -r ../agentic-layer.zip python/ && cd ..
      - echo "Uploading artifacts to S3..."
      - aws s3 cp hello_world.zip s3://$ARTIFACT_BUCKET/hello_world.zip
      - aws s3 cp margin_call_checker.zip s3://$ARTIFACT_BUCKET/margin_call_checker.zip
      - aws s3 cp agentic-layer.zip s3://$ARTIFACT_BUCKET/agentic-layer.zip

  post_build:
    commands:
      - echo "Build complete"

artifacts:
  files:
    - cfn/template.yaml
