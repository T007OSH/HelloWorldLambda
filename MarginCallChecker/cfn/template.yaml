AWSTemplateFormatVersion: "2010-09-09"
Description: MarginCallChecker Lambda - Analyzes S3 documents for margin calls using Strands Agent with Claude

Parameters:
  S3Bucket:
    Type: String
    Description: S3 bucket containing the Lambda deployment package
  S3Key:
    Type: String
    Description: S3 key for the Lambda deployment package
  AgenticLayerS3Key:
    Type: String
    Description: S3 key for the agentic layer zip
  StrandsLayerArn:
    Type: String
    Description: ARN of the official Strands Agents Lambda layer
    Default: arn:aws:lambda:us-east-1:654654176498:layer:strands-agents-layer:1

Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: MarginCallCheckerRole
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: S3ReadAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                Resource: !Sub "arn:aws:s3:::bkt-doc-src-margin-call/*"
        - PolicyName: BedrockInvokeAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                  - bedrock:InvokeModelWithResponseStream
                Resource: "*"

  AgenticLayer:
    Type: AWS::Lambda::LayerVersion
    Properties:
      LayerName: agentic-layer
      Description: Additional dependencies for the MarginCallChecker agent
      Content:
        S3Bucket: !Ref S3Bucket
        S3Key: !Ref AgenticLayerS3Key
      CompatibleRuntimes:
        - python3.12

  MarginCallCheckerFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: MarginCallCheckerFunction
      Runtime: python3.12
      Handler: lambda_function.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 120
      MemorySize: 512
      Code:
        S3Bucket: !Ref S3Bucket
        S3Key: !Ref S3Key
      Layers:
        - !Ref StrandsLayerArn
        - !Ref AgenticLayer

  S3InvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref MarginCallCheckerFunction
      Action: lambda:InvokeFunction
      Principal: s3.amazonaws.com
      SourceArn: !Sub "arn:aws:s3:::bkt-doc-src-margin-call"

  SourceBucket:
    Type: AWS::S3::Bucket
    DependsOn: S3InvokePermission
    Properties:
      BucketName: bkt-doc-src-margin-call
      NotificationConfiguration:
        LambdaConfigurations:
          - Event: s3:ObjectCreated:*
            Function: !GetAtt MarginCallCheckerFunction.Arn

Outputs:
  FunctionArn:
    Description: MarginCallChecker Lambda Function ARN
    Value: !GetAtt MarginCallCheckerFunction.Arn
  FunctionName:
    Description: MarginCallChecker Lambda Function Name
    Value: !Ref MarginCallCheckerFunction
  SourceBucketArn:
    Description: Source S3 Bucket ARN
    Value: !GetAtt SourceBucket.Arn
